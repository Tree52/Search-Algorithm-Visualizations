<!-- Format with: Prettier -->

<!DOCTYPE html>
<html>
  <head>
    <title>
      Search Algorithm Visualizations
    </title>

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/content.css">
    <link rel="stylesheet" href="styles/footer.css">
  </head>

  <body>
    <header>
      <div id="titles">
          Unsorted List Algos: <br>
          Sorted List Algos:
      </div>

      <ul>
        <li>
          <input type="radio" id="linear" name="algo" value="Linear Search" checked="checked" />
          <label for="linear">Linear</label>
        </li>
        <li>
          <input type="radio" id="sentinel" name="algo" value="Sentinel Search" />
          <label for="sentinel">Sentinel</label>
        </li>
        <li>
          <input type="radio" id="stupid" name="algo" value="Stupid Search" />
          <label for="stupid">Stupid</label>
        </li>
      </ul>
      <ul>
        <li>
          <input type="radio" id="jump" name="algo" value="Jump Search" />
          <label for="jump">Jump</label>
        </li>
        <li>
          <input type="radio" id="binary" name="algo" value="Binary Search" />
          <label for="binary">Binary</label>
        </li>
        <li>
          <input type="radio" id="fib" name="algo" value="Fibonacci Search" />
          <label for="fib">Fibonacci</label>
        </li>
        <li>
          <input type="radio" id="ternary" name="algo" value="Ternary Search" />
          <label for="ternary">Ternary</label>
        </li>
        <li>
          <input type="radio" id="exponential" name="algo" value="Exponential Search" />
          <label for="exponential">Exponential</label>
        </li>
        <li>
          <input type="radio" id="meta" name="algo" value="Meta Search" />
          <label for="meta">Meta</label>
        </li>
        <li>
          <input type="radio" id="ubiquitous" name="algo" value="Ubiquitous Search" />
          <label for="ubiquitous">Ubiquitous</label>
        </li>
      </ul>
    </header>

    <div id="content">

    </div>

    <div id="result">

    </div>

    <footer>
      <button id="-" onclick="subtract()" style="background-color: red;" disabled>
        -
      </button>
      
      <input class="fa-solid" id="arr-numbox" type="text" placeholder="#, #, ...">
      
      <button id="+" onclick="add()">
        +
      </button>

      <button class="fa-solid fa-clipboard" id="copy" onclick="copyToClipboard()">

      </button>
      
      <button type="submit" id="go" onclick="go()">
        Go
      </button>

      <button class="fa-solid fa-rotate-right" id="reset" onclick="reset()">
        
      </button>

      <input class="fa-solid" id="target-numbox" type="text" placeholder="&#xf140">
    </footer>

    <script src="https://kit.fontawesome.com/3b5c541e5c.js" crossorigin="anonymous"></script>
    <script src="script/main.js"></script>
    <script src="script/mergeSort.js"></script>
    <script src="script/color.js"></script>
    <script src="script/linear.js"></script>
    <script src="script/sentinel.js"></script>
    <script src="script/jump.js"></script>
    <script src="script/binary.js"></script>
    <script src="script/fib.js"></script>
    <script src="script/ternary.js"></script>
    <script src="script/exponential.js"></script>
    <script src="script/meta.js"></script>
    <script src="script/stupid.js"></script>
    <script src="script/ubiquitous.js"></script>
  </body>
</html>
