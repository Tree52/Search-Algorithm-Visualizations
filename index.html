<!-- Format with: Prettier -->

<!DOCTYPE html>
<html>
  <head>
    <title>
      Search Algorithms
    </title>

    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/content.css">
    <link rel="stylesheet" href="styles/footer.css">
  </head>

  <body>
    <header>
      <div class="header">
        <ul class="algorithms">
          <li>
            <input type="radio" id="binary" name="algo" value="Binary Search" checked="checked" />
            <label for="binary">Binary</label>
          </li>
          <li>
            <input type="radio" id="fib" name="algo" value="Fibonacci Search" />
            <label for="fib">Fibonacci</label>
          </li>
          <li>
            <input type="radio" id="stupid" name="algo" value="Stupid Search" />
            <label for="stupid">Stupid</label>
          </li>
        </ul>
      </div>
    </header>

    <div class="content" id="content">

    </div>

    <div class="result" id="result">

    </div>

    <footer class="footer">
      <button class="footer-button" id="-"  onclick="removeTile()" style="background-color: red;" disabled>
        -
      </button>
      
      <input class="fa-solid number-input" id="arr-numbox" type="text" placeholder="#">

      <button class="fa-solid fa-arrow-right fa-2xs" id="expand" onclick="expand()">

      </button>
      
      <button class="footer-button" id="+" onclick="newTile()">
        +
      </button>

      <button class="footer-button" type="submit" id="go" onclick="go()">
        Go
      </button>

      <button class="fa-solid fa-rotate-right" id="reset" onclick="reset()">
        
      </button>

      <input class="fa-solid number-input" id="target-numbox" type="text" placeholder="&#xf140">
    </footer>

    <script src="https://kit.fontawesome.com/3b5c541e5c.js" crossorigin="anonymous"></script>
    <script src="script/main.js"></script>
    <script src="script/mergeSort.js"></script>
    <script src="script/color.js"></script>
    <script src="script/binary.js"></script>
    <script src="script/fib.js"></script>
    <script src="script/stupid.js"></script>
  </body>
</html>
