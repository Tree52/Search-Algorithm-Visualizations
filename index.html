<!-- Format with: Prettier -->

<!DOCTYPE html>
<html>
  <head>
    <title>
      Search Algorithm Visualizations
    </title>

    <link rel="stylesheet" href="styles/content.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
  </head>

  <body>
    <header>
      <div id="titles">
          Unsorted Array Algos: <br>
          Sorted Array Algos:
      </div>

      <ul>
        <li>
          <input type="radio" id="linear" name="algo" value="Linear Search" checked="checked" />
          <label for="linear">Linear</label>
        </li>
        <li>
          <input type="radio" id="sentinel" name="algo" value="Sentinel Search" />
          <label for="sentinel">Sentinel</label>
        </li>
      </ul>
      <ul>
        <li>
          <input type="radio" id="binary" name="algo" value="Binary Search" />
          <label for="binary">Binary</label>
        </li>
        <li>
          <input type="radio" id="exponential" name="algo" value="Exponential Search" />
          <label for="exponential">Exponential</label>
        </li>
        <li>
          <input type="radio" id="fib" name="algo" value="Fibonacci Search" />
          <label for="fib">Fibonacci</label>
        </li>
        <li>
          <input type="radio" id="interpolation" name="algo" value="Interpolation Search" />
          <label for="interpolation">Interpolation</label>
        </li>
        <li>
          <input type="radio" id="jump" name="algo" value="Jump Search" />
          <label for="jump">Jump</label>
        </li>
        <li>
          <input type="radio" id="meta" name="algo" value="Meta Search" />
          <label for="meta">Meta</label>
        </li>
        <li>
          <input type="radio" id="ternary" name="algo" value="Ternary Search" />
          <label for="ternary">Ternary</label>
        </li>
        <li>
          <input type="radio" id="ubiquitous" name="algo" value="Ubiquitous Search" />
          <label for="ubiquitous">Ubiquitous</label>
        </li>
      </ul>
    </header>

    <div id="contentContainer">
      <div id="content">

      </div>

      <div id="codeContainer" style="display: none;">
        <div id="codeTitle">
          Code:
        </div>
        
        <div id="code">

        </div>

        <div class="equation" id="equation0">

        </div>

        <div class="equation" id="equation1">

        </div>
      </div>

      <button title="Code for nerds" class="fa-solid fa-2xs fa-arrow-left" id="sidebar" onclick="openCloseSidebar()">

      </button>
    </div>

    <div id="result">

    </div>

    <footer>
      <button class="fa-solid fa-arrow-left" id="left" onclick="previousState()" style="display: none;">

      </button>

      <button class="fa-solid fa-arrow-right" id="right" onclick="nextState()" style="display: none;">

      </button>

      <button id="-" onclick="pop()">
        -
      </button>
      
      <input class="fa-solid" id="arr-numbox" type="text" placeholder="#, #, ...">
      
      <button id="+" onclick="push()">
        +
      </button>
      
      <button class="fa-solid fa-clipboard" id="copy" onclick="copyToClipboard()">

      </button>
      
      <button type="submit" id="go" onclick="go()">
        Go
      </button>

      <button class="fa-solid fa-rotate-right" id="reset" onclick="reset()" style="display: none;">
        
      </button>

      <input class="fa-solid" id="target-numbox" type="text" placeholder="&#xf140" style="pointer-events: auto;">
    </footer>

    <script src="https://kit.fontawesome.com/3b5c541e5c.js" crossorigin="anonymous"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="script/color.js"></script>
    <script src="script/main.js"></script>
    <script src="script/mergeSort.js"></script>
    <script src="script/algos/binary.js"></script>
    <script src="script/algos/exponential.js"></script>
    <script src="script/algos/fibonacci.js"></script>
    <script src="script/algos/interpolation.js"></script>
    <script src="script/algos/jump.js"></script>
    <script src="script/algos/linear.js"></script>
    <script src="script/algos/meta.js"></script>
    <script src="script/algos/sentinel.js"></script>
    <script src="script/algos/ternary.js"></script>
    <script src="script/algos/ubiquitous.js"></script>
  </body>
</html>
